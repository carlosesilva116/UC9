<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Forma de Pagamento</title>

    <link rel="stylesheet" href="../../css/global.css" />

    <script src="../../js/config.js"></script>
    <script src="../../js/formaPagamento/form.js" defer></script>
  </head>

  <body>
    <header>
      <h1>Forma de Pagamento</h1>

      <nav>
        <a href="../../index.html">Home</a>
        <a href="index.html">Formas de Pagamento</a>
      </nav>
    </header>

    <main>
      <h2 id="titulo-pagina">Forma de Pagamento</h2>

      <form id="form-formapagamento">
        <div>
          <label for="nome">Nome:</label>
          <input type="text" id="nome" required maxlength="100" />
        </div>

        <div>
          <label for="Tipo">Tipo:</label>
          <select id="Tipo" required>
            <option value="">Selecione um tipo</option>
            <option value="Pix">Pix</option>
            <option value="Boleto">Boleto</option>
            <option value="Cartão de Crédito">Cartão de Crédito</option>
            <option value="Cartão de Débito">Cartão de Débito</option>
          </select>
        </div>

        <div style="margin-top: 20px">
          <button type="submit">Salvar</button>

          <a href="index.html" class="button" style="background-color: #6c757d">
            Cancelar
          </a>
        </div>
      </form>
    </main>
  </body>
</html>
